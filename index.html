<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>رسائل حب 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
}

html {
    width: 100%;
    height: 100%;
}

body{

    font-family:'Cairo', sans-serif;

    width: 100%;
    height: 100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    background-color:#170322;

    background-image:
    radial-gradient(circle at 15% 10%, rgba(255,255,255,0.18), transparent 24%),
    radial-gradient(circle at 80% 10%, rgba(255,255,255,0.12), transparent 18%),
    linear-gradient(180deg, rgba(255,123,156,0.22), rgba(105,34,199,0.15) 45%, rgba(44,11,74,0.22)),
    url('https://cdn.discordapp.com/attachments/1431423889212444854/1507769560835817562/IMG_1500.jpg?ex=6a131b54&is=6a11c9d4&hm=3aa68f87967e98768a68987e2094ea19a44c179a4ea1619303cf1b19524d8e17&');

    background-size:cover;

    background-position:center;

    background-attachment: fixed;

    position:relative;
}

/* التوهج */

.glow{

    position:absolute;

    width:600px;
    height:600px;

    background:radial-gradient(circle, rgba(255,255,255,0.22), rgba(255,63,146,0.08) 40%, transparent 70%);

    border-radius:50%;

    filter:blur(90px);

    animation:pulse 5s infinite alternate;

    pointer-events: none;
}

@keyframes pulse{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.2);
    }
}

/* القلوب */

.heart{

    position:fixed;

    color:#ffe9ff;

    opacity:0.85;

    pointer-events:none;

    animation:float 8s linear infinite;

    text-shadow:
    0 0 10px rgba(255,125,200,0.8),
    0 0 18px rgba(255,255,255,0.6);

    z-index: 1;
}

@keyframes float{

    0%{

        transform:
        translateY(100vh)
        scale(0.5)
        rotate(0deg);

        opacity:0;
    }

    30%{
        opacity:1;
    }

    100%{

        transform:
        translateY(-20vh)
        scale(1.3)
        rotate(360deg);

        opacity:0;
    }
}

/* الكارد */

.card{

    width: 90%;
    max-width: 440px;

    background:rgba(255,255,255,0.15);

    border:1px solid rgba(255,255,255,0.2);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border-radius:35px;

    padding: 30px 25px;

    text-align:center;

    position:relative;

    z-index:10;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);

    animation:fadeUp 1.2s ease;

    max-height: 85vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

.card::-webkit-scrollbar {
    width: 4px;
}

.card::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

.card::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* القلب */

.bigHeart{

    font-size: clamp(50px, 10vw, 75px);

    margin-bottom:15px;

    animation:beat 1.5s infinite;

    text-shadow:
    0 0 25px rgba(255,255,255,0.65),
    0 0 12px rgba(255,20,147,0.9);

    display: block;
    pointer-events: none;
}

@keyframes beat{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.15);
    }

    100%{
        transform:scale(1);
    }
}

/* العنوان */

h1{

    color:white;

    margin-bottom:15px;

    font-size: clamp(18px, 5vw, 28px);
    line-height: 1.3;
}

/* الرسائل */

#message{

    color:white;

    font-size: clamp(15px, 4vw, 20px);

    line-height:1.8;

    min-height:80px;

    display:flex;

    justify-content:center;

    align-items:center;

    transition:0.5s;

    white-space:pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

/* اسم المرسل */

.sender-name{

    color:#ff99cc;

    font-size: clamp(13px, 3vw, 16px);

    font-weight:bold;

    margin-top:15px;

    padding-top:15px;

    border-top:1px solid rgba(255,255,255,0.2);

    letter-spacing:1px;
}

/* الأزرار */

.button-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
}

button{

    padding: clamp(10px, 2vw, 13px) clamp(25px, 4vw, 35px);

    border:none;

    border-radius:50px;

    background:white;

    color:#ff1e4d;

    font-size: clamp(13px, 3vw, 15px);

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 5px 20px rgba(255,255,255,0.25);

    display: block;
    margin: 0 auto;
    width: 90%;
    max-width: 200px;

    -webkit-appearance: none;
    appearance: none;
    
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
}

button:active{
    transform: scale(0.98);
    opacity: 0.9;
}

button:hover{
    transform: scale(1.05);
    box-shadow:
    0 10px 30px rgba(255,255,255,0.4);
}

/* زر الموسيقى */

#musicBtn{

    padding: clamp(8px, 2vw, 10px) clamp(20px, 3vw, 25px);

    font-size: clamp(12px, 2.5vw, 13px);

    background:rgba(255,255,255,0.2);

    color:white;

    border:1px solid rgba(255,255,255,0.3);
}

#musicBtn:active, #musicBtn:hover{

    background:rgba(255,255,255,0.3);
}

/* الزخارف */

.circle{

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    pointer-events: none;
}

.c1{

    width:120px;
    height:120px;

    top:-40px;
    left:-40px;
}

.c2{

    width:90px;
    height:90px;

    bottom:-30px;
    right:-20px;
}

/* تحسينات الجوال */

@media (max-width: 768px) {
    .card {
        padding: 20px 15px;
        border-radius: 25px;
        width: 92%;
    }

    h1 {
        margin-bottom: 10px;
    }

    #message {
        min-height: 70px;
        font-size: 16px;
    }

    button {
        width: 100%;
        max-width: none;
        padding: 10px 20px;
    }
}

@media (max-width: 480px) {
    body {
        padding: 0;
    }

    .card {
        padding: 15px 12px;
        border-radius: 20px;
        width: 95%;
        max-height: 90vh;
    }

    h1 {
        margin-bottom: 8px;
        font-size: 18px;
    }

    .bigHeart {
        font-size: 55px;
        margin-bottom: 8px;
    }

    #message {
        min-height: 60px;
        font-size: 15px;
        line-height: 1.5;
    }

    .sender-name {
        margin-top: 10px;
        padding-top: 10px;
        font-size: 12px;
    }

    button {
        padding: 10px 15px;
        font-size: 13px;
        width: 100%;
    }

    #musicBtn {
        padding: 9px 15px;
        font-size: 12px;
    }

    .button-container {
        gap: 8px;
        margin-top: 12px;
    }
}

</style>

</head>

<body>

<div class="glow"></div>

<div class="card">

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="bigHeart">🤍</div>

    <h1>رسائل خاصة من فاملي الحلو</h1>

    <div id="message">
        اضغط ابدأ 🤍
    </div>

    <div class="sender-name" id="senderName"></div>

    <div class="button-container">
        <button id="mainBtn" onclick="nextMessage()">
            ابدأ
        </button>

        <button id="musicBtn" onclick="toggleMusic()">
            🎵 تشغيل الموسيقى
        </button>
    </div>

</div>

<audio id="bgMusic" loop crossorigin="anonymous">
    <source src="https://omicron.123tokyo.xyz/get.php/9/0d/vqavbT87sXo.mp3?n=%D8%B3%D9%84%D8%B7%D8%A7%D9%86%20%D8%A7%D9%84%D9%85%D8%B1%D8%B4%D8%AF%20-%20%D9%83%D9%84%20%D8%A7%D9%84%D8%AD%D9%84%D8%A7%20%28%20%D8%A3%D8%BA%D9%86%D9%8A%D8%A9%20%D8%AE%D8%A7%D8%B5%D8%A9%20%D8%AD%D8%B5%D8%B1%D9%8A%D8%A7%D9%8B%20%29%20_%202025&uT=R&uN=bXAzanVpY2VwbA%3D%3D&h=4GzXr8co8oytM4Ycd_BrfA&s=1779559372&uT=R&uN=bXAzanVpY2VwbA%3D%3D&title=%D8%B3%D9%84%D8%B7%D8%A7%D9%86%20%D8%A7%D9%84%D9%85%D8%B1%D8%B4%D8%AF%20-%20%D9%83%D9%84%20%D8%A7%D9%84%D8%AD%D9%84%D8%A7%20(%20%D8%A3%D8%BA%D9%86%D9%8A%D8%A9%20%D8%AE%D8%A7%D8%B5%D8%A9%20%D8%AD%D8%B5%D8%B1%D9%8A%D8%A7%D9%8B%20)%20%7C%202025" type="audio/mpeg">
</audio>

<script>

const messages = [
    {text: "لولي ؟", sender: "من الفاملي"},
    {text: "ثاني أعيادي معك\nأو هل من الصح أقول كل أوقاتي معك عيد؟\nمن يوم عرفتك وأنا كل أيامي أعياد", sender: "منار 💕"},
    {text: "وكل عام وأنتِ سعيدة\nوأنا الأسعد لأنك بحياتي ❤️🫵🏻", sender: "منار ✨"},
    {text: "كل عام وانتي بخيرر يا ستريمري العسل\nالله يسعدك ويوفقك ويحقق لك كل اللي تتمنينه\nوعسى أيامك كلها فرح ووناسة\nاحبككك❤️❤️", sender: "رتوج 🎀"},
    {text: "يا ساكناً في مهجتي وفؤادي\nتحلو بقربك فرحة الأعياد\nاحبببكك ححووووووب لوليي🫶🏻🫶🏻🫶🏻", sender: "نونه 💜"},
    {text: "عيدك سعيد حبيبي\nوجعلك موجودة بكل عيد\nيااا لبى يا مربى", sender: "نوني 🌸"},
    {text: "عيد اضحى سعيد يا لولي\nوممتنه مره لوجودك الحلو بحياتي🤍", sender: "جنو 💖"},
    {text: "كل عام وانتي بخير يا وجه الخير\nعيدك مبارك\nاعاده الله علينا وعليك بالصحة و العافيه\nطوري لي السكار", sender: "بيتزا 🍕"},
    {text: "كل عام وانتي عيدنا يا روحي\nعيدك مبارك يا رب كل عيدي معك\nلان الفرحة قربك فرحتين\nاحبك موت", sender: "امون 🫶🏻"},
    {text: "كل عام وانتي الخير بحد ذاته\nكل عام وانتي لعيدي فرحة\nعسى كل عيد اشوفك بخير\nو عسى ربي يخليك معي بكل سنيني", sender: "رنو ⭐"},
    {text: "كل عام وبثوثك عيدنا\nعسى ربي يعوضك على كل ثانية تقضينها بالبث\n10 دولار", sender: "الفاملي الباقي 💸"},
    {text: "عيدك مبارك يا أجمل صدفة ❤\nكل عام وأنتِ الشي الحلو اللي يجي مع العيد\nعسى العيد يجيك بفرح يشبه ضحكتك\nوسعادة تليق بقلبك الحلو\nالله يديم عليك الضحكة وراحة البال\nويحقق لك كل اللي تتمنينه", sender: "لوكا 🌹"},
    {text: "شكرا خاص لرودي على كل شي يسويه و على كل فكرة يجيبها عشان تخلي البث حلوو و الستريمر سعيدة\nصح ما شفنا رسالة منه لاكن هو بحد ذاته رسالة و هدية للبث و للستريمر\nالله لا يحرمنا من افكارك يا ابو شنب اخضر 💚", sender: "من الفاملي لرودي"},
    {text: "شكر خاص بعد ل:\n\nلوكا 🌹 مسؤول الرسائل\nنوف 🎵 مسؤولة الأغاني\nالي بتطورون له السكار:  مسؤول البرمجة\n\nشكرا على كل ما تسوونه عشان تخلوا البث احسن و أحلى 💕", sender: "الشكر الختامي 🤍"}
];
let index = -1;
let isPlaying = false;

function nextMessage(){
    index++;
    const message = document.getElementById("message");
    const senderName = document.getElementById("senderName");
    const button = document.getElementById("mainBtn");

    message.style.opacity = "0";

    setTimeout(()=>{
        if(index < messages.length){
            message.innerText = messages[index].text;
            senderName.innerText = "- " + messages[index].sender;

            if(index === messages.length - 1){
                button.innerText = "RESTART";
            } else {
                button.innerText = "NEXT";
            }
        } else {
            index = -1;
            message.innerText = "اضغط ابدأ 🤍";
            senderName.innerText = "";
            button.innerText = "ابدأ";
        }

        message.style.opacity = "1";
    },300);
}

function toggleMusic(){
    const audio = document.getElementById("bgMusic");
    const btn = document.getElementById("musicBtn");

    if(isPlaying){
        audio.pause();
        btn.innerText = "🎵 تشغيل الموسيقى";
        isPlaying = false;
    } else {
        audio.play().catch(function(error) {
            console.log("خطأ في التشغيل:", error);
        });
        btn.innerText = "⏸️ إيقاف الموسيقى";
        isPlaying = true;
    }
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = Math.random()*20 + 10 + "px";
    heart.style.animationDuration = Math.random()*4 + 4 + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,150);

</script>

</body>

</html>
